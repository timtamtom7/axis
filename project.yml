name: Axis
options:
  bundleIdPrefix: com.axisblueprint
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 AxisBlueprint. All rights reserved."
    PRODUCT_NAME: Axis
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_EMIT_LOC_STRINGS: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  Axis:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.axisblueprint.app
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        INFOPLIST_KEY_CFBundleDisplayName: Axis
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: Axis
        CFBundleDisplayName: Axis
        CFBundleIdentifier: com.axisblueprint.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Axis
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 AxisBlueprint. All rights reserved."
        NSPrincipalClass: NSApplication
